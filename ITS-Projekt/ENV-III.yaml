sensor:
  # Für den ENV-III über I²C-Bus:
  - platform: sht3xd
    i2c_id: i2c_external   # WICHTIG: Auf externen Bus routen!
    # Bezeichnungen für die gelesenen Werte
	temperature:
      name: "Raumtemperatur"
    humidity:
      name: "Relative Luftfeuchtigkeit"
    address: 0x44
    update_interval: 10s

  - platform: qmp6988
    i2c_id: i2c_external   # WICHTIG: Auf externen Bus routen!
    pressure:
      name: "Luftdruck"
    address: 0x70
    update_interval: 10s