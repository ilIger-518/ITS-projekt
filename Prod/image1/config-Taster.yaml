    - topic: "BSZ/E2FI2/cont02/env/temp"
      then:
        - lambda: |-
            const float temp = atof(x.c_str());
            id(partner_temp) = temp;
            ESP_LOGI("mqtt", "Partner-Temperatur empfangen: %.2f", temp);

sensor:
  - platform: sht3xd
    i2c_id: i2c_external
    address: 0x44
    update_interval: 20s
    temperature:
      id: env_temp
      name: "ENV Temperatur"
      on_value:
        - mqtt.publish:
            topic: "BSZ/E2FI2/cont01/env/temp"
            payload: !lambda |-
              return str_sprintf("%.2f", x);
    humidity:
      id: env_humidity
      name: "ENV Luftfeuchte"
      on_value:
        - mqtt.publish:
            topic: "BSZ/E2FI2/cont01/env/humidity"
            payload: !lambda |-
              return str_sprintf("%.2f", x);

  - platform: qmp6988
    i2c_id: i2c_external
    address: 0x70
    update_interval: 20s
    pressure:
      id: env_pressure
      name: "ENV Luftdruck"
      on_value:
        - mqtt.publish:
            topic: "BSZ/E2FI2/cont01/env/pressure"
            payload: !lambda |-
              return str_sprintf("%.2f", x);

binary_sensor:
  - platform: gpio
    pin:
      number: 5
      mode: INPUT_PULLUP
      inverted: true
    name: "Taster Status"
    id: button_g5
    on_state:
      then:
        - mqtt.publish:
            topic: "BSZ/E2FI2/Unit-01/Taster" # Unit-Nummer anpassen!
            payload: !lambda |-
              if (x) {
                return "Taster: 1"; 
              } else {
                return "Taster: 0"; 
              }
 