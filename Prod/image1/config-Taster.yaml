# Vollstaendige Beispielkonfiguration fuer das ITS-Projekt
# M5Stack AtomS3R + ENV-III + externer Taster + MQTT (Auth + TLS)

esphome:
  name: atoms3r-cont01
  friendly_name: BSZ CPS Station 01

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

logger:
  level: INFO

ota:
  - platform: esphome
    password: "verysecurepassword"

wifi:
  ssid: "iPhone von Maks"
  password: "23082025"
  ap:
    ssid: "aw-intern"
    password: "Enrollment82!"

captive_portal:

globals:
  - id: partner_temp
    type: float
    restore_value: false
    initial_value: "-1000.0"

external_components:
  - source:
      type: git
      url: https://github.com/ssieb/esphome
      ref: lp5562
    components: [lp5562]

i2c:
  - id: i2c_internal
    sda: GPIO45
    scl: GPIO0
    scan: true

  - id: i2c_external
    sda: GPIO2
    scl: GPIO1
    scan: true

lp5562:
  - i2c_id: i2c_internal

output:
  - platform: lp5562
    id: backlight_output
    channel: 3

light:
  - platform: monochromatic
    output: backlight_output
    id: atom_backlight
    name: "AtomS3R Display Backlight"
    restore_mode: ALWAYS_ON

spi:
  clk_pin: GPIO15
  mosi_pin: GPIO21

display:
  - platform: st7789v
    id: oled_display
    model: CUSTOM
    width: 128
    height: 128
    offset_width: 2
    offset_height: 1
    cs_pin: GPIO14
    dc_pin: GPIO42
    reset_pin: GPIO48
    rotation: 0
    update_interval: 1s
    lambda: |-
      const float temp = id(partner_temp);
      if (temp < -999.0) {
        it.fill(Color(0, 0, 255));
      } else if (temp < 25.0) {
        it.fill(Color(0, 255, 0));
      } else if (temp <= 28.0) {
        it.fill(Color(255, 255, 0));
      } else {
        it.fill(Color(255, 0, 0));
      }

